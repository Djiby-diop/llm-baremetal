name: llm-baremetal CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-and-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential gnu-efi \
            mtools parted dosfstools grub-pc-bin \
            xz-utils coreutils

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build + test Olympe (C)
        run: |
          make -C olympe test

      - name: Build oo-guard (release)
        working-directory: oo-guard
        run: cargo build --release

      - name: oo-guard prebuild (C risk scan)
        run: |
          ./oo-guard/target/release/oo-guard prebuild llama2_efi_final.c

      - name: Build firmware (UEFI)
        run: |
          make clean
          make repl

      - name: Build OS-G OO compiler (host tool)
        working-directory: OS-G (Operating System Genesis)
        run: |
          cargo build --features std --bin dplus_compile_oo

      - name: Compile policy.dplus -> OOPOLICY.BIN (strict)
        working-directory: OS-G (Operating System Genesis)
        run: |
          cargo run --features std --bin dplus_compile_oo -- ../policy.dplus ../OOPOLICY.BIN
          test -s ../OOPOLICY.BIN

      - name: Negative policy compile rejects missing @@PROOF
        working-directory: OS-G (Operating System Genesis)
        run: |
          python3 - <<'PY'
          from pathlib import Path
          src = Path('../policy.dplus').read_text(encoding='utf-8')
          out = []
          skip = False
          for line in src.splitlines():
              stripped = line.strip()
              if stripped.lower().startswith('@@proof'):
                  skip = True
                  continue
              if skip and stripped.startswith('@@'):
                  skip = False
              if not skip:
                  out.append(line)
          Path('../policy-missing-proof.dplus').write_text('\n'.join(out) + '\n', encoding='utf-8')
          PY
          if cargo run --features std --bin dplus_compile_oo -- ../policy-missing-proof.dplus ../policy-missing-proof.bin; then
            echo 'ERROR: compile unexpectedly succeeded without @@PROOF' >&2
            exit 1
          fi
          rm -f ../policy-missing-proof.dplus ../policy-missing-proof.bin

      - name: Create no-model boot image
        run: |
          NO_MODEL=1 EFI_BIN=llama2.efi ./create-boot-mtools.sh

      - name: Verify image embeds OO policy artifacts
        run: |
          mdir -i llm-baremetal-boot.img@@1M :: | tee /tmp/mdir-root.txt
          grep -qi 'OOPOLICY.BIN' /tmp/mdir-root.txt
          grep -qi 'OOPOLICY.CRC' /tmp/mdir-root.txt
          grep -qi 'policy.dplus' /tmp/mdir-root.txt
